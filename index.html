<!DOCTYPE html>
<html lang="en">
<head>
    </head>
<body>

<script>
// YAHAN SE CHANGES START HAIN

// 1. ADD TO CART: Purane items ko delete hone se bachane ke liye
function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;

    // LocalStorage se array nikalna
    let cart = JSON.parse(localStorage.getItem('amw_cart')) || [];

    // Check karna ki product pehle se hai kya
    const existingIndex = cart.findIndex(item => item.id === productId);

    if (existingIndex > -1) {
        // Agar hai toh quantity badhao
        cart[existingIndex].quantity += 1;
    } else {
        // Agar naya hai toh array mein push karo
        cart.push({ ...product, quantity: 1 });
    }

    // Save back to localStorage
    localStorage.setItem('amw_cart', JSON.stringify(cart));
    
    updateCartUI();
    showToast('Product added to cart!');
}

// 2. UPDATE CART UI: Saare items dikhane aur amount sahi karne ke liye
function updateCartUI() {
    const cart = JSON.parse(localStorage.getItem('amw_cart')) || [];
    const cartItemsContainer = document.querySelector('.cart-items');
    const cartBadge = document.querySelector('.cart-badge');
    const cartTotalElement = document.querySelector('.cart-total strong');

    // Badge update
    const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
    cartBadge.innerText = totalCount;

    if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<div class="cart-empty"><p>Your cart is empty</p></div>';
        cartTotalElement.innerText = '₹0';
        return;
    }

    // Loop chala kar saare items render karna
    let grandTotal = 0;
    cartItemsContainer.innerHTML = cart.map(item => {
        const itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;
        return `
            <div class="cart-item">
                <div class="cart-item-details">
                    <h4>${item.name}</h4>
                    <p>₹${item.price} x ${item.quantity} = ₹${itemTotal}</p>
                    <div class="cart-item-qty">
                        <button onclick="updateQty(${item.id}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </div>
            </div>`;
    }).join('');

    cartTotalElement.innerText = '₹' + grandTotal;
}

// 3. CHECKOUT MODAL: Order karne par saare products dikhane ke liye
function openCheckout() {
    const cart = JSON.parse(localStorage.getItem('amw_cart')) || [];
    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    const orderSummary = document.querySelector('.order-summary');
    let total = 0;
    
    // Yahan loop se saare items list honge
    const itemsHTML = cart.map(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        return `<div class="order-item">
                    <span>${item.name} (x${item.quantity})</span>
                    <span>₹${itemTotal}</span>
                </div>`;
    }).join('');

    orderSummary.innerHTML = `
        <h4>Order Summary</h4>
        ${itemsHTML}
        <div class="order-total">
            <span>Total Amount</span>
            <span>₹${total}</span>
        </div>
    `;

    document.getElementById('checkoutModal').classList.add('active');
}

// Quantity update function
function updateQty(id, change) {
    let cart = JSON.parse(localStorage.getItem('amw_cart')) || [];
    const itemIndex = cart.findIndex(item => item.id === id);
    
    if (itemIndex > -1) {
        cart[itemIndex].quantity += change;
        if (cart[itemIndex].quantity <= 0) {
            cart.splice(itemIndex, 1);
        }
        localStorage.setItem('amw_cart', JSON.stringify(cart));
        updateCartUI();
    }
}

// Toast notification
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
